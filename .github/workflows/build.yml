cat << 'EOF'
name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Reconstruct Android Project
      run: |
        mkdir -p app/src/main/java/com/creditrecovery/app
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper

        cp AndroidManifest.xml app/src/main/AndroidManifest.xml
        cp MainActivity.java app/src/main/java/com/creditrecovery/app/
        cp activity_main.xml app/src/main/res/layout/
        cp ic_launcher.png app/src/main/res/mipmap-hdpi/
        cp index.html app/src/main/assets/
        cp proguard-rules.pro app/
        cp gradle-wrapper.properties gradle/wrapper/

        cat > build.gradle << 'GRADLE'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        GRADLE

        cat > app/build.gradle << 'GRADLE'
        plugins { id 'com.android.application' }
        android {
            namespace 'com.creditrecovery.app'
            compileSdk 34
            defaultConfig {
                applicationId "com.creditrecovery.app"
                minSdk 24; targetSdk 34
                versionCode 1; versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
        GRADLE

        echo "include ':app'" > settings.gradle

        cat > app/src/main/res/values/styles.xml << 'XML'
        <resources>
          <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
            <item name="colorPrimary">#1a5fa8</item>
          </style>
        </resources>
        XML

        curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - uses: actions/upload-artifact@v4
      with:
        name: 신용회복위원회-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
EOF
