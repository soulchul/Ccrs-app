name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup project structure
        run: |
          mkdir -p app/src/main/java/com/creditrecovery/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper
          mv AndroidManifest.xml app/src/main/AndroidManifest.xml
          mv MainActivity.java app/src/main/java/com/creditrecovery/app/
          mv activity_main.xml app/src/main/res/layout/
          mv ic_launcher.png app/src/main/res/mipmap-hdpi/
          mv index.html app/src/main/assets/
          mv proguard-rules.pro app/
          mv gradle-wrapper.properties gradle/wrapper/
          echo "YnVpbGRzY3JpcHQgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KICAgIGRlcGVuZGVuY2llcyB7IGNsYXNzcGF0aCAnY29tLmFuZHJvaWQudG9vbHMuYnVpbGQ6Z3JhZGxlOjguMS4wJyB9Cn0KYWxscHJvamVjdHMgeyByZXBvc2l0b3JpZXMgeyBnb29nbGUoKTsgbWF2ZW5DZW50cmFsKCkgfSB9Cg==" | base64 -d > build.gradle
          echo "" | base64 -d > app/build.gradle
          echo "aW5jbHVkZSAnOmFwcCcK" | base64 -d > settings.gradle
          echo "PHJlc291cmNlcz48c3R5bGUgbmFtZT0iQXBwVGhlbWUiIHBhcmVudD0iVGhlbWUuQXBwQ29tcGF0LkxpZ2h0Lk5vQWN0aW9uQmFyIj48aXRlbSBuYW1lPSJjb2xvclByaW1hcnkiPiMxYTVmYTg8L2l0ZW0+PC9zdHlsZT48L3Jlc291cmNlcz4K" | base64 -d > app/src/main/res/values/styles.xml
          curl -sL https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: CCRS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
