name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create icon
        run: |
          pip install pillow -q
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import math, base64, os

          SIZE = 512
          img = Image.new('RGBA', (SIZE, SIZE), (0,0,0,0))
          draw = ImageDraw.Draw(img)
          ORANGE = (240,120,0,255)
          WHITE = (255,255,255,255)
          DARK = (50,45,42,255)
          r = 100
          x0,y0,x1,y1 = 0,0,SIZE,SIZE
          draw.rectangle([x0+r,y0,x1-r,y1],fill=ORANGE)
          draw.rectangle([x0,y0+r,x1,y1-r],fill=ORANGE)
          draw.ellipse([x0,y0,x0+r*2,y0+r*2],fill=ORANGE)
          draw.ellipse([x1-r*2,y0,x1,y0+r*2],fill=ORANGE)
          draw.ellipse([x0,y1-r*2,x0+r*2,y1],fill=ORANGE)
          draw.ellipse([x1-r*2,y1-r*2,x1,y1],fill=ORANGE)
          cx,cy = SIZE//2, SIZE//2-30
          arc_r,arc_w = 130,52
          draw.ellipse([cx-arc_r,cy-arc_r,cx+arc_r,cy+arc_r],outline=WHITE,width=arc_w)
          cut = Image.new('RGBA',(SIZE,SIZE),(0,0,0,0))
          cut_draw = ImageDraw.Draw(cut)
          cut_draw.pieslice([cx-arc_r-arc_w,cy-arc_r-arc_w,cx+arc_r+arc_w,cy+arc_r+arc_w],start=-60,end=30,fill=ORANGE)
          img = Image.alpha_composite(img,cut)
          draw = ImageDraw.Draw(img)
          dot_r = 58
          draw.ellipse([cx-dot_r,cy-dot_r+5,cx+dot_r,cy+dot_r+5],fill=WHITE)
          try:
              font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",88)
          except:
              font = ImageFont.load_default()
          bbox = draw.textbbox((0,0),"CCRS",font=font)
          tw,th = bbox[2]-bbox[0],bbox[3]-bbox[1]
          draw.text(((SIZE-tw)//2,SIZE-th-55),"CCRS",font=font,fill=DARK)
          icon192 = img.resize((192,192),Image.LANCZOS)
          icon192.save("ic_launcher.png")
          img.save("icon.png")
          print("아이콘 생성 완료")
          PYEOF

      - name: Setup project structure
        run: |
          mkdir -p app/src/main/java/com/creditrecovery/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper
          mv AndroidManifest.xml app/src/main/AndroidManifest.xml
          mv MainActivity.java app/src/main/java/com/creditrecovery/app/
          mv activity_main.xml app/src/main/res/layout/
          mv ic_launcher.png app/src/main/res/mipmap-hdpi/
          mv index.html app/src/main/assets/
          cp icon.png app/src/main/assets/
          mv proguard-rules.pro app/
          mv gradle-wrapper.properties gradle/wrapper/
          echo "YnVpbGRzY3JpcHQgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KICAgIGRlcGVuZGVuY2llcyB7IGNsYXNzcGF0aCAnY29tLmFuZHJvaWQudG9vbHMuYnVpbGQ6Z3JhZGxlOjguMS4wJyB9Cn0KYWxscHJvamVjdHMgeyByZXBvc2l0b3JpZXMgeyBnb29nbGUoKTsgbWF2ZW5DZW50cmFsKCkgfSB9Cg==" | base64 -d > build.gradle
          echo "" | base64 -d > app/build.gradle
          echo "aW5jbHVkZSAnOmFwcCcK" | base64 -d > settings.gradle
          echo "PHJlc291cmNlcz48c3R5bGUgbmFtZT0iQXBwVGhlbWUiIHBhcmVudD0iVGhlbWUuQXBwQ29tcGF0LkxpZ2h0Lk5vQWN0aW9uQmFyIj48aXRlbSBuYW1lPSJjb2xvclByaW1hcnkiPiNmMDc4MDA8L2l0ZW0+PC9zdHlsZT48L3Jlc291cmNlcz4K" | base64 -d > app/src/main/res/values/styles.xml
          echo "YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQo=" | base64 -d > gradle.properties

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: CCRS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
