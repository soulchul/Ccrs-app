name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle Wrapper
      run: |
        cd CreditRecoveryApp
        mkdir -p gradle/wrapper
        curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar
        curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" \
          -o gradlew
        chmod +x gradlew

    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

    - name: Build Debug APK
      run: |
        cd CreditRecoveryApp
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 신용회복위원회-APK
        path: CreditRecoveryApp/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
